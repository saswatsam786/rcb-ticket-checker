name: RCB Ticket Checker

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:          # allow manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to commit state back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-playwright-${{ runner.os }}

      - name: Install dependencies
        run: pip install playwright

      - name: Install Chromium
        run: python -m playwright install chromium --with-deps

      - name: Run ticket checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python checker.py --once

      - name: Save state back to repo
        run: |
          git config user.name  "rcb-bot"
          git config user.email "rcb-bot@users.noreply.github.com"
          git add .state.json
          git diff --cached --quiet || git commit -m "chore: update ticket state [skip ci]"
          git push
